<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DOCS.GATEWAY | 安全文档网关</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z'%3E%3C/path%3E%3Cpolyline points='13 2 13 9 20 9'%3E%3C/polyline%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #171717;
            overflow: hidden;
            position: relative;
        }

        .bg-scrolling {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            animation: backgroundScroll 20s linear infinite;
        }

        @keyframes backgroundScroll {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        .glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: glowMove 18s ease-in-out infinite alternate;
        }

        @keyframes glowMove {
            0% { transform: translate(-15%, -15%); opacity: 0.5; }
            100% { transform: translate(20%, 20%); opacity: 1; }
        }

        .refresh-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: rgba(255, 255, 255, 0.75);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: translateY(-3px) rotate(90deg);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .refresh-btn:active {
            transform: scale(0.92) rotate(90deg);
        }

        .refresh-btn.refreshing {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.96);
            width: 100%;
            max-width: 480px;
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.2) inset;
            padding: 48px 36px;
            position: relative;
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .brand {
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #000;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: #000;
            border-radius: 10px;
            display: grid;
            place-items: center;
            color: white;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .system-status {
            font-size: 12px;
            color: #3b3b3b;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f1f1;
            padding: 8px 16px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .system-status:hover {
            background: #e8e8e8;
            transform: scale(1.02);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            background-color: #10b981;
            border-radius: 50%;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: inherit;
            animation: dotPing 1.4s ease-out infinite;
        }

        @keyframes dotPing {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #171717 0%, #2d2d2d 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header p {
            font-size: 15px;
            color: #5e5e5e;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        .alert-box {
            background: #f8f8fa;
            border-left: 5px solid #000000;
            border-radius: 8px 18px 18px 8px;
            padding: 18px 20px;
            margin-bottom: 36px;
        }

        .alert-desc {
            font-size: 13.5px;
            color: #2c2c2c;
            line-height: 1.6;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            border: 1px solid transparent;
            gap: 8px;
        }

        .btn-primary {
            background: #000000;
            color: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.15);
            background: #1a1a1a;
        }

        .btn-secondary {
            background: #ffffff;
            color: #8c8c8c;
            border-color: #e2e2e2;
            cursor: not-allowed;
            opacity: 0.6;
            pointer-events: none;
        }

        .badge {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .badge-rec {
            background: #e3f7e3;
            color: #1f6e2f;
        }

        .badge-offline {
            background: #f0f0f0;
            color: #8b8b8b;
        }

        .source-text-label {
            font-size: 11px;
            color: #a07c2e;
            text-align: center;
            margin-top: 14px;
            padding: 0;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            font-weight: 400;
            letter-spacing: normal;
        }

        .footer {
            margin-top: 44px;
            padding-top: 24px;
            border-top: 1px solid #ececec;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #a5a5a5;
            font-family: 'SF Mono', monospace;
            font-weight: 500;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: #ffffff;
            padding: 32px 28px;
            border-radius: 32px;
            width: 90%;
            max-width: 380px;
            animation: modalPop 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        @keyframes modalPop {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-item {
            font-size: 14px;
            margin-bottom: 14px;
            padding: 12px 14px;
            background: #f6f6f8;
            border-radius: 16px;
        }

        .modal-close {
            width: 100%;
            padding: 14px;
            background: #000;
            color: white;
            border: none;
            border-radius: 24px;
            margin-top: 24px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="bg-scrolling"></div>
<div class="glow" style="top: -5%; left: -5%;"></div>
<div class="glow" style="bottom: -5%; right: -5%; background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);"></div>

<button class="refresh-btn" id="refresh-btn" title="同步最新配置">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
</button>

<div class="main-card">
    <div class="status-bar">
        <div class="brand">
            <div class="brand-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                    <polyline points="13 2 13 9 20 9"></polyline>
                </svg>
            </div>
            DOCS.GATEWAY
        </div>
        <div class="system-status" id="status-container">
            <div class="status-dot" id="status-dot" style="background-color: #10b981;"></div>
            <span id="status-text">ACTIVE</span>
        </div>
    </div>

    <div class="header">
        <h1>文档连接中心</h1>
        <p>加载安全网关配置...</p>
    </div>

    <div class="alert-box">
        <div class="alert-desc" id="alert-message">
            目前文档更新为飞书文档，不再使用金山文档，可以直接前往飞书了，不会再卡死了
        </div>
    </div>

    <div id="action-area" class="btn-group"></div>

    <div class="footer">
        <span>NODE: GATEWAY-8492A</span>
        <span>VER: 1.0.4</span>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h2 style="margin-bottom: 20px; letter-spacing: -0.02em; font-weight: 700;">配置核验</h2>
        <div id="modal-content"></div>
        <button class="modal-close" id="modal-close">确认并关闭</button>
    </div>
</div>

<script>
    // ============================================================
    // DOCS.GATEWAY - 完整功能版
    // 托管说明：将此HTML文件上传至任意静态托管服务即可
    // 如需动态更新配置，请在同目录下放置 config.json 文件
    // ============================================================
    
    const CONFIG_VERSION = "1.0.4";
    
    // 内置降级配置（当网络和缓存都不可用时使用）
    const FALLBACK_CONFIG = {
        line1_feishu: "https://jcnuvckg2scm.feishu.cn/wiki/DcJqwh898iyqHBkRGNIcuam4nHg?from=from_copylink",
        version_time: "内置稳定版本 (Fallback)"
    };
    
    let currentConfig = null;
    let currentStatusType = "active"; // active, cached, js-fallback
    
    const getEl = (id) => document.getElementById(id);
    
    function updateAlertText() {
        const alertDiv = document.querySelector('.alert-desc');
        if (alertDiv) {
            alertDiv.innerText = "目前文档更新为飞书文档，不再使用金山文档，可以直接前往飞书了，不会再卡死了";
        }
    }
    
    function updateStatusUI(type) {
        const dot = getEl('status-dot');
        const text = getEl('status-text');
        const refreshBtn = getEl('refresh-btn');
        if (!dot || !text || !refreshBtn) return;
        refreshBtn.classList.remove('refreshing');
        
        currentStatusType = type;
        
        if (type === 'refreshing') {
            text.innerText = 'SYNCING...';
            refreshBtn.classList.add('refreshing');
        } else if (type === 'js-fallback') {
            dot.style.backgroundColor = '#ef4444';
            text.innerText = 'JS FALLBACK';
        } else if (type === 'cached') {
            dot.style.backgroundColor = '#f59e0b';
            text.innerText = 'CACHED';
        } else {
            dot.style.backgroundColor = '#10b981';
            text.innerText = 'ACTIVE';
        }
    }
    
    // 从服务器获取配置（需要同目录下有 config.json）
    async function fetchConfig() {
        const t = Date.now();
        const url = `./config.json?t=${t}&v=${CONFIG_VERSION}`;
        try {
            const response = await fetch(url, { 
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache' }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const remoteData = await response.json();
            return {
                line1_feishu: remoteData.line1_feishu || FALLBACK_CONFIG.line1_feishu,
                version_time: remoteData.version_time || "云端实时配置"
            };
        } catch (err) {
            throw new Error('Network fetch failed');
        }
    }
    
    function renderButtons(data, sourcePlainText = "") {
        const area = getEl('action-area');
        if (!area) return;
        
        const line1Url = data.line1_feishu || FALLBACK_CONFIG.line1_feishu;
        
        let sourceHtml = '';
        if (sourcePlainText && sourcePlainText.trim() !== "") {
            sourceHtml = `<div class="source-text-label">${sourcePlainText}</div>`;
        }
        
        const buttonsHtml = `
            <a href="${line1Url}" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
                线路一：飞书文档（官方）
                <span class="badge badge-rec">推荐</span>
            </a>
            <div class="btn btn-secondary">
                线路二：备用在线预览（停用）
                <span class="badge badge-offline">停用</span>
            </div>
            ${sourceHtml}
        `;
        
        area.innerHTML = buttonsHtml;
    }
    
    function saveToLocalCache(data) {
        try {
            localStorage.setItem('gateway_config_v4', JSON.stringify({
                data: {
                    line1_feishu: data.line1_feishu,
                    version_time: data.version_time
                },
                time: Date.now()
            }));
        } catch(e) {}
    }
    
    async function loadApp(forceRefresh = false) {
        updateStatusUI('refreshing');
        
        try {
            const remoteData = await fetchConfig();
            currentConfig = {
                line1_feishu: remoteData.line1_feishu,
                version_time: remoteData.version_time || "云端实时版本"
            };
            renderButtons(currentConfig, "");
            updateStatusUI('active');
            saveToLocalCache(currentConfig);
        } catch (err) {
            // 网络失败，尝试读取本地缓存
            const cachedRaw = localStorage.getItem('gateway_config_v4');
            if (cachedRaw) {
                try {
                    const cachedObj = JSON.parse(cachedRaw);
                    if (cachedObj && cachedObj.data) {
                        currentConfig = {
                            line1_feishu: cachedObj.data.line1_feishu || FALLBACK_CONFIG.line1_feishu,
                            version_time: cachedObj.data.version_time || "本地缓存版本"
                        };
                        renderButtons(currentConfig, "数据来源：本地缓存");
                        updateStatusUI('cached');
                        return;
                    }
                } catch (e) {}
            }
            
            // 完全无缓存，使用内置配置
            currentConfig = {
                line1_feishu: FALLBACK_CONFIG.line1_feishu,
                version_time: "内置稳定版本"
            };
            renderButtons(currentConfig, "数据来源：内置版本");
            updateStatusUI('js-fallback');
        }
    }
    
    function handleManualRefresh() {
        loadApp(true);
    }
    
    function showModalDetails() {
        if (!currentConfig) {
            getEl('modal-content').innerHTML = `
                <div class="modal-item"><b>版本标识：</b>加载中...</div>
                <div class="modal-item"><b>连接模式：</b>--</div>
                <div class="modal-item"><b>网关内核：</b>${CONFIG_VERSION}</div>
            `;
            getEl('modal-overlay').style.display = 'flex';
            return;
        }
        
        let connectionMode = "";
        if (currentStatusType === 'cached') {
            connectionMode = "本地缓存优先";
        } else if (currentStatusType === 'js-fallback') {
            connectionMode = "降级应急(内置)";
        } else {
            connectionMode = "实时同步(云端)";
        }
        
        const versionInfo = currentConfig.version_time || "标准版本";
        getEl('modal-content').innerHTML = `
            <div class="modal-item"><b>版本标识：</b>${versionInfo}</div>
            <div class="modal-item"><b>连接模式：</b>${connectionMode}</div>
            <div class="modal-item"><b>网关内核：</b>${CONFIG_VERSION}</div>
            <div class="modal-item"><b>文档源：</b>飞书官方</div>
        `;
        getEl('modal-overlay').style.display = 'flex';
    }
    
    function closeModal() {
        getEl('modal-overlay').style.display = 'none';
    }
    
    function init() {
        updateAlertText();
        loadApp(false);
        
        const refreshBtn = getEl('refresh-btn');
        if (refreshBtn) {
            refreshBtn.onclick = () => handleManualRefresh();
        }
        
        const statusContainer = getEl('status-container');
        if (statusContainer) {
            statusContainer.onclick = () => showModalDetails();
        }
        
        const modalCloseBtn = getEl('modal-close');
        if (modalCloseBtn) {
            modalCloseBtn.onclick = () => closeModal();
        }
        
        const overlay = getEl('modal-overlay');
        if (overlay) {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closeModal();
            });
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
